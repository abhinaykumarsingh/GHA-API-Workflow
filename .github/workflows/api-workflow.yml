name: API Automation Workflow

on:
  # Allows manual execution from the Actions tab
  workflow_dispatch:

  # Runs automatically on the 30th of every month at 2:10 AM IST
  # GitHub Actions uses UTC
  # 02:10 IST = 20:40 UTC on the previous day
  schedule:
    - cron: "40 20 29 * *"

jobs:
  run-api-scripts:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download repository contents onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Create directory to store workflow logs
      - name: Create Logs Directory
        run: |
          mkdir -p logs

      # Step 3: Capture workflow execution metadata
      - name: Capture Workflow Metadata
        run: |
          {
            echo "======================================"
            echo "Workflow Metadata"
            echo "======================================"
            echo "Workflow Name : $GITHUB_WORKFLOW"
            echo "Run ID        : $GITHUB_RUN_ID"
            echo "Run Number    : $GITHUB_RUN_NUMBER"
            echo "Repository    : $GITHUB_REPOSITORY"
            echo "Branch        : $GITHUB_REF_NAME"
            echo "Triggered By  : $GITHUB_ACTOR"
            echo "Execution UTC : $(date -u)"
            echo "======================================"
          } > logs/workflow_info.log

      # Step 4: Install required packages
      - name: Install Dependencies
        run: |
          sudo apt-get update 2>&1 | tee logs/apt_update.log

          sudo apt-get install -y \
            jq \
            zip \
            moreutils \
            2>&1 | tee logs/dependency_install.log

      # Step 5: Install yq
      - name: Install yq
        run: |
          wget \
            https://github.com/mikefarah/yq/releases/download/v4.49.2/yq_linux_amd64 \
            -O yq_linux_amd64 \
            2>&1 | tee logs/yq_install.log

          sudo mv yq_linux_amd64 /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          yq --version >> logs/yq_install.log

      # Step 6: Verify all required tools
      - name: Verify Tools
        run: |
          {
            echo "===== jq ====="
            jq --version

            echo ""
            echo "===== yq ====="
            yq --version

            echo ""
            echo "===== sponge ====="
            which sponge

            echo ""
            echo "===== zip ====="
            zip -v | head -n 3
          } | tee logs/tool_verification.log

      # Step 7: Make shell scripts executable
      - name: Make Shell Scripts Executable
        run: |
          chmod +x scripts/api_fetch.sh
          chmod +x scripts/extract_names.sh

      # Step 8: Fetch API data and generate JSON/YAML files
      - name: Run API Fetch Script
        run: |
          ./scripts/api_fetch.sh 2>&1 | tee logs/api_fetch.log

      # Step 9: Read YAML and extract user names
      - name: Run Extract Names Script
        run: |
          ./scripts/extract_names.sh 2>&1 | tee logs/extract_names.log

      # Step 10: Display generated output files
      - name: Display Generated Files
        run: |
          {
            echo "===== Output Directory ====="
            ls -R output

            echo ""
            echo "===== File Sizes ====="
            du -sh output/*
          } | tee logs/output_listing.log

      # Step 11: Create one consolidated log file
      - name: Create Master Log
        run: |
          cat \
            logs/workflow_info.log \
            logs/tool_verification.log \
            logs/api_fetch.log \
            logs/extract_names.log \
            logs/output_listing.log \
            > logs/full_execution.log

      # Step 12: Upload output and logs as a single GitHub artifact
      # GitHub automatically compresses these folders.
      # No nested ZIP files will be created.
      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-workflow-output
          path: |
            output/
            logs/
